server:
  port: 8081

spring:
  application:
    name: xiaolai-blog
  profiles:
    active: dev
  datasource:

    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/xiaolai_blog?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 116013.jm
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.xiaolai.blog.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT config
jwt:
  secret: xiaolai-blog-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000

# File upload
upload:
  path: ./uploads
  allowed-extensions: jpg,jpeg,png,gif,webp,bmp,svg,zip,rar,pdf,doc,docx

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html